  <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PasswordGen</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
   <div class="container">
  <h2>Password Generator</h2>

  <input type="text" id="password" placeholder="Generated Password" readonly>

  <div class="options">
    <label>Password Length:
      <input type="number" id="length" value="12" min="4" max="30">
    </label>

    <label><input type="checkbox" name="passwordType" id="funnypassword">Funny Password</label>
    <label><input type="checkbox" name="passwordType" id="weakpassword">Weak Password</label>
    <label><input type="checkbox" name="passwordType" id="strongpassword">Strong Password</label>
  </div>

  <button onclick="generatePassword()">Generate Password</button>
</div>

    <script src="script.js"></script>
  </body>
</html>
